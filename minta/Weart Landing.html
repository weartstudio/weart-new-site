<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Weart — Websites engineered for performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --primary:#00C2CB;
    --primary-2:#AEDFDC;
    --dark:#0D172E;
    --light:#C0EBF1;
    --white:#F8F9FA;
    --text:#0D172E;
    --footer-bg:#0a0f18;
    --footer-text:#77848d;
    --accent:#FF6B4A;
    --bg:#F4F6F5;
    --card:#FFFFFF;
    --line:rgba(13,23,46,0.08);
    --muted:#5b6478;
    --serif:'Instrument Serif', 'Times New Roman', serif;
    --sans:'Inter', system-ui, -apple-system, sans-serif;
    --mono:'JetBrains Mono', ui-monospace, monospace;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
  body{overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  img{max-width:100%;display:block}

  /* ===== Theme: dark ===== */
  body.theme-dark{
    --bg:#0D172E;
    --card:#141f3d;
    --text:#F8F9FA;
    --muted:#9aa3bd;
    --line:rgba(255,255,255,0.08);
    --white:#0D172E;
  }

  /* ===== Layout ===== */
  .container{max-width:1240px;margin:0 auto;padding:0 32px}
  .container-wide{max-width:1360px;margin:0 auto;padding:0 32px}

  /* ===== Top nav ===== */
  .nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);background:color-mix(in srgb, var(--bg) 78%, transparent);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:18px 0;gap:32px}
  .logo{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-size:28px;letter-spacing:-0.01em}
  .logo-mark{width:32px;height:32px;border-radius:10px;background:var(--dark);display:grid;place-items:center;color:var(--primary);font-weight:700;font-family:var(--sans);font-size:15px;letter-spacing:-0.04em}
  body.theme-dark .logo-mark{background:var(--primary);color:var(--dark)}
  .logo b{font-family:var(--sans);font-weight:600;font-size:18px;letter-spacing:-0.02em}
  .nav-links{display:flex;gap:34px;font-size:14.5px;color:var(--text)}
  .nav-links a{position:relative;padding:6px 0;opacity:.78;transition:opacity .2s}
  .nav-links a:hover{opacity:1}
  .nav-links a.has-arrow::after{content:"";display:inline-block;margin-left:6px;width:6px;height:6px;border-right:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:translateY(-2px) rotate(45deg)}
  .nav-cta{display:flex;align-items:center;gap:14px}

  .btn{display:inline-flex;align-items:center;gap:10px;padding:13px 22px;border-radius:999px;font-size:14.5px;font-weight:500;letter-spacing:-0.005em;transition:transform .15s ease, background .2s, color .2s, box-shadow .2s;white-space:nowrap}
  .btn:hover{transform:translateY(-1px)}
  .btn-primary{background:var(--dark);color:#fff}
  body.theme-dark .btn-primary{background:var(--primary);color:var(--dark)}
  .btn-primary:hover{box-shadow:0 12px 28px -10px rgba(13,23,46,0.4)}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--card);border-color:var(--text)}
  .btn .arrow{transition:transform .2s}
  .btn:hover .arrow{transform:translateX(3px)}

  /* ===== Hero ===== */
  .hero{position:relative;padding:88px 0 60px;overflow:hidden}
  .hero-grid{display:grid;grid-template-columns:1.05fr 0.95fr;gap:64px;align-items:center}
  .eyebrow{display:inline-flex;align-items:center;gap:10px;padding:7px 14px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-size:12.5px;font-weight:500;letter-spacing:0.02em;color:var(--text)}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 4px color-mix(in srgb, var(--primary) 25%, transparent)}
  .h1{font-family:var(--serif);font-weight:400;font-size:clamp(48px, 6.5vw, 92px);line-height:0.98;letter-spacing:-0.025em;margin:22px 0 24px}
  .h1 em{font-style:italic;color:var(--primary)}
  .h1 .underline{position:relative;display:inline-block;font-style:italic}
  .h1 .underline::after{content:"";position:absolute;left:0;right:0;bottom:6px;height:8px;background:var(--primary-2);z-index:-1;border-radius:4px}
  body.theme-dark .h1 .underline::after{background:color-mix(in srgb,var(--primary) 35%, transparent)}
  .lead{font-size:19px;color:var(--muted);max-width:520px;margin-bottom:36px;line-height:1.55}
  .hero-ctas{display:flex;gap:14px;flex-wrap:wrap}

  .hero-meta{display:flex;gap:36px;margin-top:48px;padding-top:32px;border-top:1px solid var(--line)}
  .meta-item .num{font-family:var(--serif);font-size:34px;line-height:1;letter-spacing:-0.02em}
  .meta-item .lbl{font-size:12.5px;color:var(--muted);margin-top:6px;letter-spacing:0.04em;text-transform:uppercase}

  /* hero visual */
  .hero-visual{position:relative;height:560px}
  .browser{position:absolute;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 30px 60px -28px rgba(13,23,46,0.25), 0 8px 24px -12px rgba(13,23,46,0.18);overflow:hidden}
  .browser-bar{display:flex;align-items:center;gap:6px;padding:11px 14px;border-bottom:1px solid var(--line);background:color-mix(in srgb, var(--card) 90%, var(--text) 3%)}
  .browser-bar .dot{width:9px;height:9px;border-radius:50%;background:var(--line)}
  .browser-bar .url{margin-left:12px;font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--bg);padding:5px 12px;border-radius:6px;flex:1}
  .browser-body{padding:20px;height:calc(100% - 38px);position:relative;overflow:hidden}

  .browser-main{
    width:560px;height:520px;
    top:30px;left:0;
    transform:rotate(-2.5deg);
  }
  .browser-main .browser-body{
    background:linear-gradient(180deg, var(--light) 0%, var(--card) 60%);
  }

  .mock-h{font-family:var(--serif);font-size:34px;line-height:1.05;letter-spacing:-0.02em;margin:18px 0 10px;color:var(--dark)}
  .mock-h em{color:var(--primary);font-style:italic}
  body.theme-dark .mock-h{color:var(--text)}
  .mock-p{font-size:11.5px;color:var(--muted);max-width:300px;line-height:1.5}
  .mock-row{display:flex;gap:8px;margin-top:14px}
  .mock-pill{height:24px;padding:0 12px;display:grid;place-items:center;border-radius:999px;background:var(--dark);color:#fff;font-size:11px}
  .mock-pill.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
  .mock-stripe{height:8px;background:var(--bg);border-radius:4px;margin-top:8px}
  .mock-stripe.short{width:62%}
  .mock-stripe.shorter{width:40%}

  /* score chips */
  .score{position:absolute;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 18px 16px;box-shadow:0 20px 40px -20px rgba(13,23,46,0.25);display:flex;flex-direction:column;align-items:center;gap:8px;animation:floaty 6s ease-in-out infinite}
  .score .ring{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;position:relative;background:conic-gradient(var(--primary) var(--p), var(--line) 0)}
  .score .ring::before{content:"";position:absolute;inset:6px;border-radius:50%;background:var(--card)}
  .score .ring span{position:relative;font-family:var(--serif);font-size:28px;letter-spacing:-0.02em}
  .score .lbl{font-size:11.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);font-weight:500}

  .score-1{top:10px;left:-20px;--p:360deg;animation-delay:0s}
  .score-2{top:60px;right:-10px;--p:360deg;animation-delay:1.2s}
  .score-3{top:330px;left:30px;--p:342deg;animation-delay:2.4s}
  .score-4{top:380px;right:30px;--p:360deg;animation-delay:0.6s}

  @keyframes floaty{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
  }

  /* trust strip */
  .trust{margin-top:64px;padding:22px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap}
  .trust-label{font-size:12.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-weight:500}
  .trust-row{display:flex;gap:48px;align-items:center;flex-wrap:wrap}
  .trust-row span{font-family:var(--serif);font-size:22px;color:var(--text);opacity:.8;letter-spacing:-0.01em}
  .trust-row span small{font-family:var(--sans);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);display:block;margin-top:2px;font-weight:500}

  /* ===== Section heading ===== */
  .sec{padding:120px 0}
  .sec-head{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:end;margin-bottom:56px}
  .sec-tag{font-family:var(--mono);font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--primary);margin-bottom:18px;display:flex;align-items:center;gap:10px}
  .sec-tag::before{content:"";width:24px;height:1px;background:var(--primary)}
  .sec-h{font-family:var(--serif);font-size:clamp(40px, 4.5vw, 64px);line-height:1.02;letter-spacing:-0.025em;font-weight:400}
  .sec-h em{font-style:italic;color:var(--primary)}
  .sec-sub{font-size:17px;color:var(--muted);line-height:1.55;max-width:440px;justify-self:end}

  /* ===== Services bento ===== */
  .bento{display:grid;grid-template-columns:repeat(6, 1fr);gap:18px;grid-auto-rows:minmax(220px, auto)}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:32px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;transition:transform .3s ease, border-color .3s}
  .tile:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--primary) 60%, var(--line))}
  .tile-num{font-family:var(--mono);font-size:11.5px;color:var(--muted);letter-spacing:0.1em}
  .tile-title{font-family:var(--serif);font-size:32px;line-height:1.05;letter-spacing:-0.02em;margin:14px 0 10px;font-weight:400}
  .tile-desc{font-size:14.5px;color:var(--muted);line-height:1.5}
  .tile-link{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:500;color:var(--text);margin-top:18px}
  .tile-link::after{content:"→";transition:transform .2s}
  .tile:hover .tile-link::after{transform:translateX(4px)}

  .tile-1{grid-column:span 3;grid-row:span 2;background:linear-gradient(135deg, var(--dark) 0%, #1a2752 100%);color:#fff}
  .tile-1 .tile-num,.tile-1 .tile-desc{color:rgba(255,255,255,0.6)}
  .tile-1 .tile-link{color:#fff}
  .tile-1 .tile-title em{color:var(--primary);font-style:italic}
  .tile-1 .visual{position:absolute;bottom:-20px;right:-20px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle, var(--primary) 0%, transparent 70%);opacity:0.35;filter:blur(20px)}
  .tile-1 .codeblock{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 16px;font-family:var(--mono);font-size:12px;line-height:1.7;color:rgba(255,255,255,0.7);margin-top:auto;position:relative;z-index:1}
  .tile-1 .codeblock .c-key{color:var(--primary)}
  .tile-1 .codeblock .c-val{color:#fff}

  .tile-2{grid-column:span 3}
  .tile-2 .gauge{height:120px;display:flex;align-items:flex-end;gap:6px;margin-top:auto;padding-top:18px}
  .tile-2 .gauge i{flex:1;background:linear-gradient(180deg, var(--primary) 0%, var(--primary-2) 100%);border-radius:4px;display:block}

  .tile-3{grid-column:span 3}
  .tile-3 .pulse{margin-top:auto;padding-top:18px}
  .tile-3 .bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:12px}
  .tile-3 .bar i{display:block;height:100%;background:var(--primary);border-radius:3px}
  .tile-3 .bar-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:6px}

  .tile-4{grid-column:span 2;background:var(--light)}
  body.theme-dark .tile-4{background:#1a2a4a}
  .tile-4 .icon-stack{font-family:var(--serif);font-size:60px;line-height:1;color:var(--dark);letter-spacing:-0.04em;margin-top:auto}
  body.theme-dark .tile-4 .icon-stack{color:var(--primary)}

  .tile-5{grid-column:span 2}
  .tile-5 .ssl{margin-top:auto;display:flex;flex-direction:column;gap:8px}
  .tile-5 .ssl-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
  .tile-5 .ssl-row::before{content:"";width:14px;height:14px;border-radius:50%;background:var(--primary);position:relative;flex-shrink:0;display:grid;place-items:center}
  .tile-5 .ssl-row span.bg{position:absolute}
  .tile-5 .check{position:relative;width:14px;height:14px;flex-shrink:0;background:var(--primary);border-radius:50%}
  .tile-5 .check::after{content:"";position:absolute;left:4px;top:6px;width:3px;height:6px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg)}

  .tile-6{grid-column:span 2;background:var(--accent);color:#fff}
  .tile-6 .tile-num,.tile-6 .tile-desc{color:rgba(255,255,255,0.8)}
  .tile-6 .tile-link{color:#fff}
  .tile-6 .big-arrow{font-family:var(--serif);font-size:120px;line-height:0.8;margin-top:auto;align-self:flex-end}

  /* ===== Why us ===== */
  .why{background:var(--dark);color:#fff;border-radius:32px;padding:90px 64px;position:relative;overflow:hidden}
  .why::before{content:"";position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle, color-mix(in srgb,var(--primary) 40%, transparent) 0%, transparent 60%);pointer-events:none}
  .why-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;position:relative}
  .why .sec-tag{color:var(--primary)}
  .why .sec-h{color:#fff}
  .why-feat{display:flex;flex-direction:column;gap:36px}
  .feat{padding-bottom:32px;border-bottom:1px solid rgba(255,255,255,0.1)}
  .feat:last-child{border-bottom:none;padding-bottom:0}
  .feat-h{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .feat-num{font-family:var(--mono);font-size:13px;color:var(--primary);letter-spacing:0.08em}
  .feat-h h4{font-family:var(--serif);font-size:30px;font-weight:400;letter-spacing:-0.02em}
  .feat p{color:rgba(255,255,255,0.65);font-size:15px;line-height:1.6;max-width:480px}

  /* testimonial */
  .testimonial{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:40px;margin-top:60px;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center}
  .quote{font-family:var(--serif);font-size:30px;line-height:1.2;letter-spacing:-0.02em;font-weight:400}
  .quote em{font-style:italic;color:var(--primary)}
  .quote::before{content:"\201C";font-size:80px;line-height:0.5;display:block;margin-bottom:8px;color:var(--primary)}
  .author{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;min-width:160px}
  .avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg, var(--primary), var(--primary-2));display:grid;place-items:center;font-family:var(--serif);font-size:32px;color:var(--dark)}
  .author-name{font-weight:600;font-size:15px}
  .author-role{font-size:12.5px;color:var(--muted);margin-top:2px}

  /* ===== Marquee ===== */
  .marquee{padding:32px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);overflow:hidden;background:var(--bg)}
  .marquee-track{display:flex;gap:64px;animation:scroll 30s linear infinite;white-space:nowrap;align-items:center}
  .marquee-track span{font-family:var(--serif);font-size:32px;font-style:italic;letter-spacing:-0.02em;color:var(--text);opacity:.55;display:inline-flex;align-items:center;gap:64px}
  .marquee-track span::after{content:"\2731";font-style:normal;color:var(--primary);font-size:18px;opacity:.7}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* ===== Pricing ===== */
  .pricing-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:20px}
  .price-card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:36px;display:flex;flex-direction:column;position:relative;transition:transform .3s, border-color .3s}
  .price-card:hover{transform:translateY(-4px)}
  .price-card.featured{background:var(--dark);color:#fff;border-color:var(--dark)}
  .price-card.featured .pc-tier,.price-card.featured .pc-desc,.price-card.featured .pc-feat{color:rgba(255,255,255,0.7)}
  .price-card.featured .pc-feat::before{background:var(--primary)}
  .pc-badge{position:absolute;top:24px;right:24px;padding:5px 11px;border-radius:999px;background:var(--primary);color:var(--dark);font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
  .pc-tier{font-family:var(--mono);font-size:11.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
  .pc-price{font-family:var(--serif);font-size:64px;line-height:1;letter-spacing:-0.03em;margin-bottom:6px}
  .pc-price small{font-family:var(--sans);font-size:14px;color:var(--muted);font-weight:400;letter-spacing:0;display:inline-block;margin-left:4px}
  .price-card.featured .pc-price small{color:rgba(255,255,255,0.6)}
  .pc-desc{font-size:14px;color:var(--muted);margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--line)}
  .price-card.featured .pc-desc{border-color:rgba(255,255,255,0.12)}
  .pc-feats{display:flex;flex-direction:column;gap:12px;margin-bottom:32px;flex:1}
  .pc-feat{font-size:14px;display:flex;align-items:center;gap:10px}
  .pc-feat::before{content:"";width:14px;height:14px;border-radius:50%;background:var(--text);opacity:.85;position:relative;flex-shrink:0;background-image:linear-gradient(45deg, transparent 38%, #fff 38%, #fff 45%, transparent 45%, transparent 50%, #fff 50%, #fff 65%, transparent 65%);background-size:14px 14px}
  .price-card .btn{width:100%;justify-content:center}

  /* ===== Insights / blog ===== */
  .insights{display:grid;grid-template-columns:repeat(3, 1fr);gap:24px}
  .insight{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;transition:transform .3s, border-color .3s}
  .insight:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--primary) 60%, var(--line))}
  .insight-img{aspect-ratio:16/10;background:var(--light);position:relative;overflow:hidden}
  .insight-img.a{background:linear-gradient(135deg, var(--light) 0%, var(--primary-2) 100%)}
  .insight-img.b{background:linear-gradient(135deg, var(--dark) 0%, #1f2a52 100%)}
  .insight-img.c{background:linear-gradient(135deg, var(--accent) 0%, #ff8c70 100%)}
  .insight-img .glyph{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--serif);font-size:120px;font-style:italic;color:rgba(13,23,46,0.15);letter-spacing:-0.04em}
  .insight-img.b .glyph{color:rgba(255,255,255,0.15)}
  .insight-img.c .glyph{color:rgba(255,255,255,0.25)}
  .insight-body{padding:26px 28px 30px;display:flex;flex-direction:column;flex:1}
  .insight-meta{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .insight-meta .tag{color:var(--primary)}
  .insight-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--muted)}
  .insight-title{font-family:var(--serif);font-size:24px;line-height:1.15;letter-spacing:-0.02em;margin-bottom:10px;font-weight:400}
  .insight-excerpt{font-size:14px;color:var(--muted);line-height:1.55;margin-bottom:20px;flex:1}
  .insight-foot{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:var(--muted);padding-top:18px;border-top:1px solid var(--line)}
  .insight-foot a{color:var(--text);font-weight:500;display:inline-flex;align-items:center;gap:6px}

  /* ===== FAQ ===== */
  .faq-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:60px;align-items:start}
  .faq{display:flex;flex-direction:column}
  .faq-item{padding:24px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .faq-item:first-child{border-top:1px solid var(--line)}
  .faq-q{display:flex;justify-content:space-between;align-items:center;font-family:var(--serif);font-size:22px;letter-spacing:-0.015em;line-height:1.25}
  .faq-q .pls{width:24px;height:24px;border-radius:50%;border:1px solid var(--line);position:relative;flex-shrink:0;transition:transform .3s, background .2s}
  .faq-q .pls::before,.faq-q .pls::after{content:"";position:absolute;background:var(--text);left:50%;top:50%;transform:translate(-50%,-50%)}
  .faq-q .pls::before{width:10px;height:1.5px}
  .faq-q .pls::after{width:1.5px;height:10px;transition:transform .25s}
  .faq-item.open .faq-q .pls{background:var(--primary);border-color:var(--primary)}
  .faq-item.open .faq-q .pls::before,.faq-item.open .faq-q .pls::after{background:var(--dark)}
  .faq-item.open .faq-q .pls::after{transform:translate(-50%,-50%) rotate(90deg)}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease, margin .3s ease;color:var(--muted);font-size:15px;line-height:1.6}
  .faq-item.open .faq-a{max-height:200px;margin-top:14px}

  /* ===== Big CTA ===== */
  .big-cta{position:relative;border-radius:32px;overflow:hidden;padding:90px 60px;background:linear-gradient(135deg, var(--primary) 0%, #4dd5dc 60%, var(--primary-2) 100%);color:var(--dark);display:grid;grid-template-columns:1.4fr 1fr;gap:40px;align-items:center}
  .big-cta::before{content:"\2731";position:absolute;top:40px;right:60px;font-family:var(--serif);font-size:140px;color:var(--dark);opacity:.08;line-height:1}
  .big-cta h2{font-family:var(--serif);font-size:clamp(40px, 5vw, 72px);line-height:1;letter-spacing:-0.025em;font-weight:400}
  .big-cta h2 em{font-style:italic}
  .big-cta p{margin-top:20px;font-size:18px;max-width:480px;color:rgba(13,23,46,0.75)}
  .big-cta .ctas{display:flex;flex-direction:column;gap:14px;align-items:flex-start}
  .big-cta .btn-primary{background:var(--dark);color:#fff}
  .big-cta .meta{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--dark);opacity:.7}
  .big-cta .meta::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--dark);animation:blink 1.4s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

  /* ===== Footer ===== */
  footer{background:var(--footer-bg);color:var(--footer-text);padding:80px 0 40px;margin-top:120px}
  .foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:48px;margin-bottom:60px}
  .foot-brand .logo{color:#fff;margin-bottom:18px}
  .foot-brand .logo b{color:#fff}
  .foot-brand p{font-size:14.5px;line-height:1.6;max-width:320px}
  .foot-col h5{color:#fff;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:20px;font-weight:600}
  .foot-col ul{list-style:none;display:flex;flex-direction:column;gap:12px}
  .foot-col a{font-size:14.5px;transition:color .2s}
  .foot-col a:hover{color:#fff}
  .foot-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:32px;border-top:1px solid rgba(255,255,255,0.08);font-size:13px;flex-wrap:wrap;gap:20px}
  .foot-bottom .links{display:flex;gap:28px}
  .foot-newsletter{display:flex;gap:8px;margin-top:18px}
  .foot-newsletter input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:12px 16px;border-radius:999px;font-family:inherit;font-size:14px;outline:none}
  .foot-newsletter input::placeholder{color:rgba(255,255,255,0.4)}
  .foot-newsletter button{background:var(--primary);color:var(--dark);padding:12px 18px;border-radius:999px;font-weight:500;font-size:14px}

  /* responsive */
  @media (max-width: 1024px){
    .hero-grid,.sec-head,.why-grid,.faq-grid,.big-cta{grid-template-columns:1fr;gap:40px}
    .sec-sub{justify-self:start}
    .bento{grid-template-columns:repeat(2,1fr)}
    .tile-1,.tile-2,.tile-3{grid-column:span 2}
    .tile-4,.tile-5,.tile-6{grid-column:span 2}
    .insights,.pricing-grid{grid-template-columns:1fr}
    .foot-grid{grid-template-columns:1fr 1fr}
    .why{padding:60px 32px}
    .hero-visual{height:480px}
  }
  @media (max-width: 640px){
    .nav-links{display:none}
    .container,.container-wide{padding:0 20px}
    .testimonial{grid-template-columns:1fr;text-align:center}
    .hero-meta{gap:24px;flex-wrap:wrap}
    .big-cta{padding:50px 28px}
    .sec{padding:80px 0}
  }

  /* anim reveal */
  .reveal{opacity:0;transform:translateY(20px);transition:opacity .8s ease, transform .8s ease}
  .reveal.in{opacity:1;transform:translateY(0)}
</style>
</head>
