<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Weart — Weboldalak kkv-knak, profin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --primary:#00C2CB;
    --primary-2:#AEDFDC;
    --dark:#0D172E;
    --light:#C0EBF1;
    --white:#F8F9FA;
    --text:#0D172E;
    --footer-bg:#0a0f18;
    --footer-text:#77848d;
    --accent:#FF6B4A;
    --bg:#F4F6F5;
    --card:#FFFFFF;
    --line:rgba(13,23,46,0.08);
    --muted:#5b6478;
    --display:'Manrope', system-ui, -apple-system, sans-serif;
    --sans:'Manrope', system-ui, -apple-system, sans-serif;
    --mono:'JetBrains Mono', ui-monospace, monospace;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  body{overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  img{max-width:100%;display:block}

  /* ===== Theme: dark ===== */
  body.theme-dark{
    --bg:#0D172E;
    --card:#141f3d;
    --text:#F8F9FA;
    --muted:#9aa3bd;
    --line:rgba(255,255,255,0.08);
    --white:#0D172E;
  }

  /* ===== Layout ===== */
  .container{max-width:1240px;margin:0 auto;padding:0 32px}
  .container-wide{max-width:1360px;margin:0 auto;padding:0 32px}

  /* ===== Top nav ===== */
  .nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);background:color-mix(in srgb, var(--bg) 78%, transparent);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:18px 0;gap:32px}
  .logo{display:flex;align-items:center;gap:10px;font-size:18px;letter-spacing:-0.02em}
  .logo-mark{width:36px;height:36px;border-radius:10px;background:var(--dark);display:grid;place-items:center;color:var(--primary);transition:transform .35s cubic-bezier(.2,.8,.2,1)}
  .logo-mark svg{display:block}
  .logo:hover .logo-mark{transform:rotate(-6deg) scale(1.05)}
  body.theme-dark .logo-mark{background:var(--primary);color:var(--dark)}
  .logo b{font-family:var(--sans);font-weight:700;font-size:18px;letter-spacing:-0.025em}
  .nav-links{display:flex;gap:34px;font-size:14.5px;color:var(--text)}
  .nav-links a{position:relative;padding:6px 0;opacity:.78;transition:opacity .2s}
  .nav-links a:hover{opacity:1}
  .nav-links a.has-arrow::after{content:"";display:inline-block;margin-left:6px;width:6px;height:6px;border-right:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:translateY(-2px) rotate(45deg)}
  .nav-cta{display:flex;align-items:center;gap:14px}

  .btn{display:inline-flex;align-items:center;gap:10px;padding:13px 22px;border-radius:999px;font-size:14.5px;font-weight:500;letter-spacing:-0.005em;transition:transform .15s ease, background .2s, color .2s, box-shadow .2s;white-space:nowrap}
  .btn:hover{transform:translateY(-1px)}
  .btn-primary{background:var(--dark);color:#fff}
  body.theme-dark .btn-primary{background:var(--primary);color:var(--dark)}
  .btn-primary:hover{box-shadow:0 12px 28px -10px rgba(13,23,46,0.4)}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--card);border-color:var(--text)}
  .btn .arrow{transition:transform .2s}
  .btn:hover .arrow{transform:translateX(3px)}

  /* ===== Hero ===== */
  .hero{position:relative;padding:64px 0 40px;overflow:hidden}
  .hero-grid{display:grid;grid-template-columns:1.05fr 0.95fr;gap:48px;align-items:center}
  .eyebrow{display:inline-flex;align-items:center;gap:10px;padding:7px 14px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-size:12.5px;font-weight:500;letter-spacing:0.02em;color:var(--text)}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 4px color-mix(in srgb, var(--primary) 25%, transparent)}
  .h1{font-family:var(--display);font-weight:700;font-size:clamp(36px, 4.6vw, 60px);line-height:1.05;letter-spacing:-0.035em;margin:18px 0 18px}
  .h1 em{font-style:normal;color:var(--primary);font-weight:700}
  .h1 .underline{position:relative;display:inline-block;font-style:normal;font-weight:700}
  .h1 .underline::after{content:"";position:absolute;left:0;right:0;bottom:4px;height:10px;background:var(--primary-2);z-index:-1;border-radius:2px}
  body.theme-dark .h1 .underline::after{background:color-mix(in srgb,var(--primary) 35%, transparent)}
  .lead{font-size:17px;color:var(--muted);max-width:500px;margin-bottom:28px;line-height:1.55}
  .hero-ctas{display:flex;gap:14px;flex-wrap:wrap}

  .hero-meta{display:flex;gap:32px;margin-top:36px;padding-top:24px;border-top:1px solid var(--line)}
  .meta-item .num{font-family:var(--display);font-weight:700;font-size:24px;line-height:1;letter-spacing:-0.03em}
  .meta-item .lbl{font-size:11.5px;color:var(--muted);margin-top:6px;letter-spacing:0.04em;text-transform:uppercase}

  /* hero visual */
  .hero-visual{position:relative;height:480px}
  .hero-glow{position:absolute;inset:-40px;background:radial-gradient(ellipse 60% 50% at 30% 40%, color-mix(in srgb, var(--primary) 35%, transparent) 0%, transparent 70%);filter:blur(40px);z-index:0;animation:glowPulse 6s ease-in-out infinite}
  .hero-grid-bg{position:absolute;inset:-20px;background-image:linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);background-size:32px 32px;opacity:.5;-webkit-mask-image:radial-gradient(ellipse 60% 60% at 50% 50%, #000 30%, transparent 75%);mask-image:radial-gradient(ellipse 60% 60% at 50% 50%, #000 30%, transparent 75%);z-index:0;animation:gridDrift 18s linear infinite}
  @keyframes glowPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
  @keyframes gridDrift{from{background-position:0 0, 0 0}to{background-position:32px 32px, 32px 32px}}
  .browser{position:absolute;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 30px 60px -28px rgba(13,23,46,0.25), 0 8px 24px -12px rgba(13,23,46,0.18);overflow:hidden}
  .browser-bar{display:flex;align-items:center;gap:6px;padding:11px 14px;border-bottom:1px solid var(--line);background:color-mix(in srgb, var(--card) 90%, var(--text) 3%)}
  .browser-bar .dot{width:9px;height:9px;border-radius:50%;background:var(--line)}
  .browser-bar .url{margin-left:12px;font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--bg);padding:5px 12px;border-radius:6px;flex:1}
  .browser-body{padding:20px;height:calc(100% - 38px);position:relative;overflow:hidden}

  .browser-main{
    width:520px;height:460px;
    top:20px;left:0;
    transform:rotate(-2.5deg);
    transition:transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    transform-style:preserve-3d;
  }
  .browser-main:hover{transform:rotate(-1deg) translateY(-6px) scale(1.02)}
  .browser-main{animation:browserFloat 8s ease-in-out infinite}
  @keyframes browserFloat{0%,100%{transform:rotate(-2.5deg) translateY(0)}50%{transform:rotate(-2.2deg) translateY(-10px)}}
  .browser-main:hover{animation-play-state:paused}
  .url-loader{position:absolute;left:14px;right:14px;bottom:0;height:2px;background:linear-gradient(90deg, transparent, var(--primary), transparent);animation:urlLoad 3.5s ease-in-out infinite;pointer-events:none}
  .browser-bar{position:relative}
  @keyframes urlLoad{0%{transform:translateX(-100%);opacity:0}10%{opacity:1}50%{transform:translateX(0%);opacity:1}90%{opacity:0}100%{transform:translateX(100%);opacity:0}}
  .url-typing{display:inline-block;overflow:hidden;white-space:nowrap;animation:urlType 2.4s steps(28, end) .3s both}
  @keyframes urlType{from{width:0}to{width:100%}}
  @keyframes mockFadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes typingCursor{0%,100%{opacity:0}50%{opacity:1}}
  @keyframes stripeGrow{from{width:0}}
  /* CTA pulse */
  .mock-cta-pulse{position:relative;animation:mockFadeUp .6s ease both .9s, ctaPulse 2.4s ease-in-out 3.5s infinite;background:linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%) !important;box-shadow:0 0 0 0 color-mix(in srgb, var(--primary) 60%, transparent)}
  @keyframes ctaPulse{0%,100%{box-shadow:0 0 0 0 color-mix(in srgb, var(--primary) 60%, transparent)}50%{box-shadow:0 0 0 12px color-mix(in srgb, var(--primary) 0%, transparent)}}
  /* moving cursor */
  .mock-cursor{position:absolute;left:0;top:0;z-index:10;animation:cursorPath 6s ease-in-out 2.6s infinite;filter:drop-shadow(0 2px 6px rgba(13,23,46,0.3))}
  @keyframes cursorPath{
    0%{left:280px;top:200px;opacity:0;transform:scale(.9)}
    8%{opacity:1;transform:scale(1)}
    35%{left:90px;top:215px;transform:scale(1)}
    50%{left:90px;top:215px;transform:scale(.85)}
    55%{left:90px;top:215px;transform:scale(1)}
    85%{left:90px;top:215px;opacity:1}
    100%{left:90px;top:215px;opacity:0}
  }
  /* toast notification */
  .mock-toast{position:absolute;right:-12px;bottom:18px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px 10px 10px;display:flex;align-items:center;gap:10px;box-shadow:0 12px 28px -10px rgba(13,23,46,0.25);animation:toastIn 5s ease-in-out 4.8s infinite;z-index:9;min-width:170px}
  .mock-toast-ico{width:28px;height:28px;border-radius:50%;background:var(--primary);color:var(--dark);display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0}
  .mock-toast-h{font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:-0.01em;color:var(--text)}
  .mock-toast-p{font-size:10.5px;color:var(--muted);font-family:var(--mono)}
  @keyframes toastIn{0%{opacity:0;transform:translateX(20px) scale(.9)}8%{opacity:1;transform:translateX(0) scale(1)}80%{opacity:1;transform:translateX(0) scale(1)}100%{opacity:0;transform:translateX(20px) scale(.95)}}
  .mock-anim-pill{animation:mockFadeUp .5s ease both}
  .mock-anim-pill:nth-child(1){animation-delay:.1s}
  .mock-anim-pill:nth-child(2){animation-delay:.2s}
  .mock-anim-pill:nth-child(3){animation-delay:.3s}
  .mock-h-anim{animation:mockFadeUp .6s ease both;animation-delay:.45s}
  .mock-h-anim::after{content:"|";color:var(--primary);animation:typingCursor 1s infinite;margin-left:2px;font-weight:300}
  .mock-p-anim{animation:mockFadeUp .6s ease both;animation-delay:.7s}
  .mock-row-anim{animation:mockFadeUp .6s ease both;animation-delay:.9s}
  .mock-stripe-anim{animation:stripeGrow .8s cubic-bezier(0.4,0,0.2,1) both, mockFadeUp .6s ease both;}
  .mock-stripe-anim:nth-of-type(1){animation-delay:1.1s, 1.1s}
  .mock-stripe-anim:nth-of-type(2){animation-delay:1.25s, 1.25s}
  .mock-stripe-anim:nth-of-type(3){animation-delay:1.4s, 1.4s}
  .browser-main .browser-body{
    background:linear-gradient(180deg, var(--light) 0%, var(--card) 60%);
  }

  .mock-h{font-family:var(--display);font-weight:700;font-size:24px;line-height:1.15;letter-spacing:-0.03em;margin:14px 0 8px;color:var(--dark)}
  .mock-h em{color:var(--primary);font-style:normal;font-weight:700}
  body.theme-dark .mock-h{color:var(--text)}
  .mock-p{font-size:11.5px;color:var(--muted);max-width:300px;line-height:1.5}
  .mock-row{display:flex;gap:8px;margin-top:14px}
  .mock-pill{height:24px;padding:0 12px;display:grid;place-items:center;border-radius:999px;background:var(--dark);color:#fff;font-size:11px}
  .mock-pill.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
  .mock-stripe{height:8px;background:var(--bg);border-radius:4px;margin-top:8px}
  .mock-stripe.short{width:62%}
  .mock-stripe.shorter{width:40%}

  /* score chips */
  .score{position:absolute;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px 14px;box-shadow:0 20px 40px -20px rgba(13,23,46,0.25);display:flex;flex-direction:column;align-items:center;gap:6px;animation:floaty 6s ease-in-out infinite}
  .score .ring{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;position:relative;background:conic-gradient(var(--primary) var(--p), var(--line) 0)}
  .score .ring::before{content:"";position:absolute;inset:5px;border-radius:50%;background:var(--card)}
  .score .ring span{position:relative;font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:-0.03em}
  .score .lbl{font-size:10.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);font-weight:500}

  .score-1{top:10px;left:-20px;--p:360deg;animation-delay:0s}
  .score-2{top:60px;right:-10px;--p:360deg;animation-delay:1.2s}
  .score-3{top:330px;left:30px;--p:342deg;animation-delay:2.4s}
  .score-4{top:380px;right:30px;--p:360deg;animation-delay:0.6s}

  @keyframes floaty{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
  }

  /* trust strip */
  .trust{margin-top:48px;padding:18px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);display:grid;grid-template-columns:auto 1fr;align-items:center;gap:32px}
  .trust-label{font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-weight:500;white-space:nowrap}
  .trust-marquee{position:relative;overflow:hidden;-webkit-mask-image:linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);mask-image:linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent)}
  .trust-track{display:flex;gap:48px;width:max-content;animation:trustScroll 32s linear infinite}
  .trust-marquee:hover .trust-track{animation-play-state:paused}
  @keyframes trustScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .client-logo{display:flex;align-items:center;gap:12px;flex-shrink:0;opacity:.65;transition:opacity .25s ease, transform .25s ease;color:var(--text)}
  .client-logo:hover{opacity:1;transform:translateY(-2px)}
  .client-logo-mark{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;background:color-mix(in srgb, var(--primary) 12%, transparent);color:var(--text);flex-shrink:0;transition:background .25s ease, color .25s ease}
  .client-logo:hover .client-logo-mark{background:var(--primary);color:var(--dark)}
  .client-logo-text{display:flex;flex-direction:column;line-height:1.1}
  .client-logo-text b{font-family:var(--display);font-weight:700;font-size:14.5px;letter-spacing:-0.02em}
  .client-logo-text small{font-family:var(--mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .trust-row span small{font-family:var(--sans);font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);display:block;margin-top:2px;font-weight:500}

  /* ===== Section heading ===== */
  .sec{padding:80px 0}
  .sec-head{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end;margin-bottom:40px}
  .sec-tag{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--primary);margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .sec-tag::before{content:"";width:24px;height:1px;background:var(--primary)}
  .sec-h{font-family:var(--display);font-size:clamp(28px, 3.2vw, 42px);line-height:1.1;letter-spacing:-0.035em;font-weight:700}
  .sec-h em{font-style:normal;color:var(--primary);font-weight:700}
  .sec-sub{font-size:15px;color:var(--muted);line-height:1.6;max-width:420px;justify-self:end}

  /* ===== Services bento ===== */
  .bento{display:grid;grid-template-columns:repeat(6, 1fr);gap:14px;grid-auto-rows:minmax(200px, auto)}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;transition:transform .3s ease, border-color .3s}
  .tile:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--primary) 60%, var(--line))}
  .tile-num{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:0.1em}
  .tile-title{font-family:var(--display);font-size:20px;line-height:1.2;letter-spacing:-0.03em;margin:10px 0 8px;font-weight:700}
  .tile-desc{font-size:13.5px;color:var(--muted);line-height:1.55}
  .tile-link{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--text);margin-top:14px}
  .tile-link::after{content:"→";transition:transform .2s}
  .tile:hover .tile-link::after{transform:translateX(4px)}

  .tile-1{grid-column:span 4;grid-row:span 2;background:linear-gradient(135deg, var(--dark) 0%, #1a2752 100%);color:#fff;padding:36px 36px 32px}
  .tile-1 .hero-tile-h{font-family:var(--display);font-size:38px;line-height:1.05;letter-spacing:-0.04em;font-weight:700;margin:14px 0 14px}
  .tile-1 .hero-tile-h em{color:var(--primary);font-style:normal;font-weight:700;display:inline-block;position:relative}
  .tile-1 .hero-tile-h em::after{content:"";position:absolute;left:0;right:0;bottom:2px;height:8px;background:color-mix(in srgb,var(--primary) 25%, transparent);z-index:-1;border-radius:2px}
  .tile-1 .hero-tile-desc{font-size:14.5px;color:rgba(255,255,255,0.7);line-height:1.6;max-width:520px;margin-bottom:22px}
  .tile-1 .feat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px;position:relative;z-index:1}
  .tile-1 .mini-feat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px 18px 22px}
  .tile-1 .mini-feat .ico{width:36px;height:36px;border-radius:10px;background:color-mix(in srgb,var(--primary) 20%, transparent);display:grid;place-items:center;margin-bottom:14px;color:var(--primary);font-size:14px;font-weight:700}
  .tile-1 .mini-feat h5{font-family:var(--display);font-size:15.5px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px}
  .tile-1 .mini-feat p{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.55}
  .tile-1 .badge-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .tile-1 .badge-row .b{font-family:var(--mono);font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 10px;border-radius:999px;background:var(--primary);color:var(--dark);font-weight:600}
  .tile-1 .badge-row .b.ghost{background:transparent;border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.7);font-weight:500}
  .tile-1 .tile-num,.tile-1 .tile-desc{color:rgba(255,255,255,0.6)}
  .tile-1 .tile-link{color:#fff}
  .tile-1 .tile-title em{color:var(--primary);font-style:normal;font-weight:700}
  .tile-1 .visual{position:absolute;bottom:-20px;right:-20px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle, var(--primary) 0%, transparent 70%);opacity:0.35;filter:blur(20px)}
  .tile-1 .codeblock{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;font-family:var(--mono);font-size:11px;line-height:1.7;color:rgba(255,255,255,0.7);position:relative;z-index:1;display:none}
  .tile-1 .codeblock .c-key{color:var(--primary)}
  .tile-1 .codeblock .c-val{color:#fff}
  .tile-1 .wp-mark{position:absolute;top:24px;right:28px;display:flex;flex-direction:column;align-items:flex-end;gap:8px;z-index:2;color:rgba(255,255,255,0.85);pointer-events:none}
  .tile-1 .wp-mark svg{width:56px;height:56px;opacity:.92;filter:drop-shadow(0 4px 16px rgba(0,194,203,0.25))}
  .tile-1 .wp-mark-label{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.5)}

  .tile-2{grid-column:span 2}
  .tile-2 .gauge{height:120px;display:flex;align-items:flex-end;gap:6px;margin-top:auto;padding-top:18px}
  .tile-2 .gauge i{flex:1;background:linear-gradient(180deg, var(--primary) 0%, var(--primary-2) 100%);border-radius:4px;display:block}

  .tile-3{grid-column:span 2}
  .tile-3 .pulse{margin-top:auto;padding-top:18px}
  .tile-3 .bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:12px}
  .tile-3 .bar i{display:block;height:100%;background:var(--primary);border-radius:3px}
  .tile-3 .bar-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:6px}

  .tile-4{grid-column:span 2;background:var(--light)}
  body.theme-dark .tile-4{background:#1a2a4a}
  .tile-4 .icon-stack{margin-top:auto;display:flex;align-items:flex-end;gap:10px}
  .tile-4 .design-glyph{width:60px;height:60px;border-radius:12px;background:#fff;border:1px solid rgba(13,23,46,0.1);position:relative;display:grid;place-items:center;box-shadow:0 6px 16px -8px rgba(13,23,46,0.2)}
  body.theme-dark .tile-4 .design-glyph{background:#0D172E;border-color:rgba(255,255,255,0.1)}
  .tile-4 .design-glyph svg{width:28px;height:28px}
  .tile-4 .design-glyph.canvas{background:linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%)}
  .tile-4 .design-glyph.canvas::before{content:"";position:absolute;inset:12px;border:1.5px dashed var(--dark);border-radius:5px;opacity:.5}
  .tile-4 .design-glyph.canvas::after{content:"";position:absolute;left:16px;top:16px;width:12px;height:12px;background:var(--dark);border-radius:3px}
  .tile-4 .design-glyph.swatch{background:transparent;border:none;box-shadow:none;display:flex;flex-direction:column;gap:4px;padding:0;width:60px;height:60px;justify-content:center}
  .tile-4 .design-glyph.swatch i{display:block;width:60px;height:16px;border-radius:4px}
  body.theme-dark .tile-4 .icon-stack{color:var(--primary)}

  .tile-5{grid-column:span 2}
  .tile-5 .ssl{margin-top:auto;display:flex;flex-direction:column;gap:8px}
  .tile-5 .ssl-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
  .tile-5 .ssl-row span.bg{position:absolute}
  .tile-5 .check{position:relative;width:16px;height:16px;flex-shrink:0;background:var(--primary);border-radius:50%}
  .tile-5 .check::after{content:"";position:absolute;left:50%;top:46%;width:3px;height:7px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:translate(-60%,-55%) rotate(45deg)}

  .tile-6{grid-column:span 2;background:var(--accent);color:#fff}
  .tile-6 .tile-num,.tile-6 .tile-desc{color:rgba(255,255,255,0.8)}
  .tile-6 .tile-link{color:#fff}
  .tile-6 .big-arrow{font-weight:300;font-size:120px;line-height:0.8;margin-top:auto;align-self:flex-end}

  /* ===== Why us ===== */
  .why{background:var(--dark);color:#fff;border-radius:24px;padding:60px 48px;position:relative;overflow:hidden}
  .why::before{content:"";position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle, color-mix(in srgb,var(--primary) 40%, transparent) 0%, transparent 60%);pointer-events:none}
  .why-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;position:relative}
  .why .sec-tag{color:var(--primary)}
  .why .sec-h{color:#fff}
  .why-feat{display:flex;flex-direction:column;gap:24px}
  .feat{padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.1)}
  .feat:last-child{border-bottom:none;padding-bottom:0}
  .feat-h{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .feat-num{font-family:var(--mono);font-size:12px;color:var(--primary);letter-spacing:0.08em}
  .feat-h h4{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:-0.02em}
  .feat p{color:rgba(255,255,255,0.65);font-size:14px;line-height:1.6;max-width:480px}

  /* testimonial */
  .testimonial{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:48px 48px 36px;margin-top:44px;display:grid;grid-template-columns:1fr auto;gap:48px;align-items:center;position:relative;overflow:hidden}
  .quote{font-family:var(--display);font-size:18px;line-height:1.55;letter-spacing:-0.01em;font-weight:500;position:relative}
  .quote em{font-style:normal;color:var(--primary);font-weight:700}
  .testimonial .quote-mark{position:absolute;left:28px;top:8px;font-family:var(--display);font-size:120px;line-height:1;color:var(--primary);font-weight:700;opacity:.85;pointer-events:none;z-index:0}
  .testimonial-slide{display:contents;animation:tFade .6s ease both}
  @keyframes tFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .testimonial-rotator{padding-top:64px}
  .testimonial-rotator .quote{padding-left:0;position:relative;z-index:1}
  .testimonial-dots{position:absolute;left:48px;bottom:20px;display:flex;gap:8px;z-index:2}
  .t-dot{width:22px;height:4px;border-radius:999px;background:rgba(255,255,255,0.18);border:none;padding:0;cursor:pointer;transition:background .2s ease, width .25s ease}
  .t-dot.active{background:var(--primary);width:32px}
  .t-dot:hover{background:rgba(255,255,255,0.4)}
  .author{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;min-width:140px}
  .avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg, var(--primary), var(--primary-2));display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:24px;color:var(--dark)}
  .author-name{font-weight:600;font-size:14px}
  .author-role{font-size:11.5px;color:var(--muted);margin-top:2px}

  /* ===== Marquee ===== */
  .marquee{padding:24px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);overflow:hidden;background:var(--bg)}
  .marquee-track{display:flex;gap:48px;animation:scroll 30s linear infinite;white-space:nowrap;align-items:center}
  .marquee-track span{font-family:var(--display);font-weight:600;font-size:20px;letter-spacing:-0.025em;color:var(--text);opacity:.55;display:inline-flex;align-items:center;gap:48px}
  .marquee-track span::after{content:"\2731";font-style:normal;color:var(--primary);font-size:18px;opacity:.7}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* ===== Pricing ===== */
  .pricing-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:20px}
  .price-card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:36px;display:flex;flex-direction:column;position:relative;transition:transform .3s, border-color .3s}
  .price-card:hover{transform:translateY(-4px)}
  .price-card.featured{background:var(--dark);color:#fff;border-color:var(--dark)}
  .price-card.featured .pc-tier,.price-card.featured .pc-desc,.price-card.featured .pc-feat{color:rgba(255,255,255,0.7)}
  .price-card.featured .pc-feat::before{background:var(--primary)}
  .pc-badge{position:absolute;top:24px;right:24px;padding:5px 11px;border-radius:999px;background:var(--primary);color:var(--dark);font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
  .pc-tier{font-family:var(--mono);font-size:11.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
  .pc-price{font-family:var(--display);font-weight:700;font-size:52px;line-height:1;letter-spacing:-0.04em;margin-bottom:6px}
  .pc-price small{font-family:var(--sans);font-size:14px;color:var(--muted);font-weight:400;letter-spacing:0;display:inline-block;margin-left:4px}
  .price-card.featured .pc-price small{color:rgba(255,255,255,0.6)}
  .pc-desc{font-size:14px;color:var(--muted);margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--line)}
  .price-card.featured .pc-desc{border-color:rgba(255,255,255,0.12)}
  .pc-feats{display:flex;flex-direction:column;gap:12px;margin-bottom:32px;flex:1}
  .pc-feat{font-size:14px;display:flex;align-items:center;gap:10px}
  .pc-feat::before{content:"";width:14px;height:14px;border-radius:50%;background:var(--text);opacity:.85;position:relative;flex-shrink:0;background-image:linear-gradient(45deg, transparent 38%, #fff 38%, #fff 45%, transparent 45%, transparent 50%, #fff 50%, #fff 65%, transparent 65%);background-size:14px 14px}
  .price-card .btn{width:100%;justify-content:center}

  /* ===== Insights / blog ===== */
  .insights{display:grid;grid-template-columns:repeat(3, 1fr);gap:24px}
  .insight{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;transition:transform .3s, border-color .3s}
  .insight:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--primary) 60%, var(--line))}
  .insight-img{aspect-ratio:16/10;background:var(--light);position:relative;overflow:hidden}
  .insight-img.a{background:linear-gradient(135deg, var(--light) 0%, var(--primary-2) 100%)}
  .insight-img.b{background:linear-gradient(135deg, var(--dark) 0%, #1f2a52 100%)}
  .insight-img.c{background:linear-gradient(135deg, var(--accent) 0%, #ff8c70 100%)}
  .insight-img .glyph{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:88px;color:rgba(13,23,46,0.15);letter-spacing:-0.05em}
  .insight-img.b .glyph{color:rgba(255,255,255,0.15)}
  .insight-img.c .glyph{color:rgba(255,255,255,0.25)}
  .insight-body{padding:22px 24px 24px;display:flex;flex-direction:column;flex:1}
  .insight-meta{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .insight-meta .tag{color:var(--primary)}
  .insight-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--muted)}
  .insight-title{font-family:var(--display);font-size:17px;line-height:1.25;letter-spacing:-0.025em;margin-bottom:8px;font-weight:700}
  .insight-excerpt{font-size:13.5px;color:var(--muted);line-height:1.55;margin-bottom:16px;flex:1}
  .insight-foot{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);padding-top:14px;border-top:1px solid var(--line)}
  .insight-foot a{color:var(--text);font-weight:500;display:inline-flex;align-items:center;gap:6px}

  /* ===== FAQ ===== */
  .faq-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:60px;align-items:start}
  .faq{display:flex;flex-direction:column}
  .faq-item{padding:18px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .faq-item:first-child{border-top:1px solid var(--line)}
  .faq-q{display:flex;justify-content:space-between;align-items:center;font-family:var(--display);font-size:16px;letter-spacing:-0.015em;line-height:1.35;font-weight:600;gap:24px}
  .faq-q .pls{width:24px;height:24px;border-radius:50%;border:1px solid var(--line);position:relative;flex-shrink:0;transition:transform .3s, background .2s}
  .faq-q .pls::before,.faq-q .pls::after{content:"";position:absolute;background:var(--text);left:50%;top:50%;transform:translate(-50%,-50%)}
  .faq-q .pls::before{width:10px;height:1.5px}
  .faq-q .pls::after{width:1.5px;height:10px;transition:transform .25s}
  .faq-item.open .faq-q .pls{background:var(--primary);border-color:var(--primary)}
  .faq-item.open .faq-q .pls::before,.faq-item.open .faq-q .pls::after{background:var(--dark)}
  .faq-item.open .faq-q .pls::after{transform:translate(-50%,-50%) rotate(90deg)}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease, margin .3s ease;color:var(--muted);font-size:14px;line-height:1.6}
  .faq-item.open .faq-a{max-height:200px;margin-top:14px}

  /* ===== Big CTA ===== */
  .big-cta{position:relative;border-radius:32px;overflow:hidden;padding:56px 56px;background:linear-gradient(135deg, var(--primary) 0%, #4dd5dc 60%, var(--primary-2) 100%);color:var(--dark);display:grid;grid-template-columns:1.4fr 1fr;gap:32px;align-items:center}
  .big-cta::before{content:"\2731";position:absolute;top:40px;right:60px;font-size:140px;color:var(--dark);opacity:.08;line-height:1}
  .big-cta h2{font-family:var(--display);font-size:clamp(28px, 3.4vw, 44px);line-height:1.05;letter-spacing:-0.035em;font-weight:700}
  .big-cta h2 em{font-style:normal;font-weight:700}
  .big-cta p{margin-top:14px;font-size:15px;max-width:460px;color:rgba(13,23,46,0.75)}
  .big-cta .ctas{display:flex;flex-direction:column;gap:14px;align-items:flex-start}
  .big-cta .btn-primary{background:var(--dark);color:#fff}
  .big-cta .meta{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--dark);opacity:.7}
  .big-cta .meta::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--dark);animation:blink 1.4s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

  /* Contact card inside Big CTA */
  .contact-card{background:rgba(13,23,46,0.06);border:1px solid rgba(13,23,46,0.12);border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:18px;backdrop-filter:blur(4px)}
  .contact-card-head{display:flex;align-items:center;gap:14px}
  .contact-avatar{position:relative;width:56px;height:56px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--dark);display:grid;place-items:center;border:2px solid rgba(13,23,46,0.15)}
  .contact-avatar svg{position:absolute;inset:0;width:100%;height:100%;opacity:.55}
  .contact-avatar-label{position:relative;font-family:var(--display);font-weight:700;font-size:18px;color:#fff;letter-spacing:0.02em}
  .contact-name{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:-0.02em;color:var(--dark);line-height:1.15}
  .contact-role{font-family:var(--mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--dark);opacity:.55;margin-top:4px}
  .contact-blurb{font-size:14px;line-height:1.55;color:rgba(13,23,46,0.78);margin:0}
  .contact-blurb b{font-weight:700;color:var(--dark)}
  .contact-rows{display:flex;flex-direction:column;gap:8px;border-top:1px solid rgba(13,23,46,0.12);padding-top:16px}
  .contact-row{display:flex;align-items:center;gap:12px;font-size:15px;font-weight:600;color:var(--dark);padding:8px 4px;border-radius:8px;transition:transform .15s ease, background .15s ease}
  .contact-row:hover{background:rgba(13,23,46,0.05);transform:translateX(2px)}
  .contact-row-ico{width:32px;height:32px;border-radius:9px;background:var(--dark);color:var(--primary);display:grid;place-items:center;flex-shrink:0}

  /* ===== Footer ===== */
  footer{background:var(--footer-bg);color:var(--footer-text);padding:60px 0 32px;margin-top:80px}
  .foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px;margin-bottom:44px}
  .foot-brand .logo{color:#fff;margin-bottom:18px}
  .foot-brand .logo b{color:#fff}
  .foot-brand p{font-size:14.5px;line-height:1.6;max-width:320px}
  .foot-col h5{color:#fff;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:20px;font-weight:600}
  .foot-col ul{list-style:none;display:flex;flex-direction:column;gap:12px}
  .foot-col a{font-size:14.5px;transition:color .2s}
  .foot-col a:hover{color:#fff}
  .foot-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:32px;border-top:1px solid rgba(255,255,255,0.08);font-size:13px;flex-wrap:wrap;gap:20px}
  .foot-bottom .links{display:flex;gap:28px}
  .foot-newsletter{display:flex;gap:8px;margin-top:18px}
  .foot-newsletter input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:12px 16px;border-radius:999px;font-family:inherit;font-size:14px;outline:none}
  .foot-newsletter input::placeholder{color:rgba(255,255,255,0.4)}
  .foot-newsletter button{background:var(--primary);color:var(--dark);padding:12px 18px;border-radius:999px;font-weight:500;font-size:14px}

  /* ===== Team ===== */
  .team-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .team-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px;display:flex;gap:22px;align-items:flex-start;transition:border-color .3s, transform .3s}
  .team-card:hover{border-color:color-mix(in srgb,var(--primary) 60%, var(--line));transform:translateY(-3px)}
  .team-photo{width:84px;height:84px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg, var(--light), var(--primary-2));display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:32px;color:var(--dark);position:relative;overflow:hidden}
  .team-photo.balazs{background:linear-gradient(135deg, var(--dark) 0%, #1f2a52 100%);color:var(--primary)}
  .team-photo.fanni{background:linear-gradient(135deg, var(--accent) 0%, #ff8c70 100%);color:#fff}
  .team-info{flex:1;min-width:0}
  .team-name{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:-0.025em;line-height:1.1}
  .team-role{font-family:var(--mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--primary);margin-top:6px;margin-bottom:12px}
  .team-bio{font-size:13.5px;color:var(--muted);line-height:1.55;margin-bottom:14px}
  .team-tags{display:flex;flex-wrap:wrap;gap:6px}
  .team-tag{font-size:11px;padding:4px 10px;border-radius:999px;border:1px solid var(--line);color:var(--muted);font-weight:500}

  /* responsive */
  @media (max-width: 1024px){
    .hero-grid,.sec-head,.why-grid,.faq-grid,.big-cta{grid-template-columns:1fr;gap:40px}
    .sec-sub{justify-self:start}
    .bento{grid-template-columns:repeat(2,1fr)}
    .tile-1,.tile-2,.tile-3{grid-column:span 2}
    .tile-4,.tile-5,.tile-6{grid-column:span 2}
    .insights,.pricing-grid{grid-template-columns:1fr}
    .foot-grid{grid-template-columns:1fr 1fr}
    .why{padding:60px 32px}
    .hero-visual{height:480px}
  }
  @media (max-width: 640px){
    .nav-links{display:none}
    .container,.container-wide{padding:0 20px}
    .testimonial{grid-template-columns:1fr;text-align:center}
    .hero-meta{gap:24px;flex-wrap:wrap}
    .big-cta{padding:50px 28px}
    .sec{padding:80px 0}
  }

  /* anim reveal */
  .reveal{opacity:0;transform:translateY(20px);transition:opacity .8s ease, transform .8s ease}
  .reveal.in{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app-v2.jsx"></script>
</body>
